<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DD1_JR | Cyber Operations v2.6</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-purple: #bc13fe; --neon-blue: #00d2ff; --bg-dark: #020202; --card-bg: rgba(8, 8, 8, 0.92);
            --disabled: #444; /* لون الرصاصي للحالة المطفأة */
        }

        body {
            background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; overflow-x: hidden; height: 100vh; overflow-y: hidden; scroll-behavior: smooth;
            cursor: none; /* إخفاء الماوس الأصلي لعمل الماوس الجديد */
        }

        /* [1] الماوس الجديد الفخم */
        #custom-cursor {
            position: fixed; width: 20px; height: 20px; background: var(--neon-blue);
            border-radius: 50%; pointer-events: none; z-index: 10001; mix-blend-mode: screen;
            box-shadow: 0 0 15px var(--neon-blue), 0 0 30px var(--neon-blue);
            transition: transform 0.1s ease-out; transform: translate(-50%, -50%);
        }
        #cursor-outline {
            position: fixed; width: 40px; height: 40px; border: 2px solid var(--neon-purple);
            border-radius: 50%; pointer-events: none; z-index: 10000;
            transition: 0.15s ease-out; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px var(--neon-purple);
        }

        #matrix-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.35; filter: blur(0.5px); }

        /* [2] أزرار التحكم والعداد الجديد */
        .ui-controls { 
            position: fixed; top: 20px; left: 25px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; 
            background: rgba(0,0,0,0.5); padding: 15px; border-radius: 12px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .ui-controls button {
            background: rgba(0, 0, 0, 0.9); border: 1px solid var(--neon-purple);
            color: var(--neon-purple); padding: 10px 20px; border-radius: 6px;
            cursor: pointer; font-family: 'Share Tech Mono', monospace; font-size: 0.8rem;
            transition: 0.4s; display: flex; align-items: center; gap: 8px; width: 100%;
        }

        /* ستايل الحالة المطفأة */
        .ui-controls button.is-off {
            border-color: var(--disabled) !important;
            color: var(--disabled) !important;
            text-shadow: none !important;
            box-shadow: none !important;
        }

        .matrix-slider-container {
            display: flex; flex-direction: column; gap: 5px; margin-top: 5px;
        }
        .matrix-slider-container label { font-size: 0.6rem; color: var(--neon-blue); font-family: monospace; }
        
        /* ستايل الـ Slider */
        input[type=range] {
            -webkit-appearance: none; width: 100%; background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; background: #222; border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%;
            background: var(--neon-blue); cursor: pointer; margin-top: -4px;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        /* [3] بقية تنسيقاتك الأصلية كما هي */
        #intro-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .intro-logo-text { font-size: 5rem; font-weight: 900; color: white; text-shadow: 0 0 30px #bc13fe; font-family: monospace; letter-spacing: 15px; }
        .load-track { width: 300px; height: 3px; background: rgba(255,255,255,0.1); margin-top: 35px; }
        #bar { width: 0%; height: 100%; background: var(--neon-purple); }
        .neon-title { font-size: 5rem; font-weight: 900; background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin: 20px 0; }
        .terminal-box { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; backdrop-filter: blur(10px); transition: 0.4s; }
        .terminal-box:hover { transform: translateY(-10px); border-color: var(--neon-purple); box-shadow: 0 10px 30px rgba(188, 19, 254, 0.2); }
        .identity-wrapper { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; width: 100%; max-width: 1100px; padding: 0 20px; }
        .bio-line { margin: 12px 0; } .bio-key { color: var(--neon-purple); font-weight: bold; }
        #system-logs { position: fixed; bottom: 25px; right: 25px; width: 300px; height: 150px; background: rgba(0,0,0,0.9); border-left: 4px solid var(--neon-blue); padding: 15px; font-family: monospace; font-size: 0.7rem; color: var(--neon-blue); }
        .social-bar { display: flex; gap: 25px; margin: 20px 0; }
        .social-bar a { color: white; font-size: 1.8rem; transition: 0.3s; }
        .social-bar a:hover { color: var(--neon-blue); transform: scale(1.2); }
        section { display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div id="cursor-outline"></div>

    <div id="intro-overlay">
        <div class="intro-logo-text">DD1_JR</div>
        <div class="load-track"><div id="bar"></div></div>
    </div>

    <canvas id="matrix-canvas"></canvas>

    <div id="system-logs"></div>

    <div class="ui-controls">
        <button onclick="toggleMatrix()" id="matrixBtn"><i class="fas fa-code"></i> MATRIX: ON</button>
        
        <div class="matrix-slider-container">
            <label>MATRIX_OPACITY</label>
            <input type="range" id="opacitySlider" min="0" max="1" step="0.01" value="0.35" oninput="updateOpacity(this.value)">
        </div>

        <button onclick="toggleLogs()" id="logsBtn"><i class="fas fa-terminal"></i> OS_LOGS: ON</button>
    </div>

    <section id="hero">
        <h1 class="neon-title">DD1_JR</h1>
        
        <div class="social-bar">
            <a href="https://github.com/DanneKZ"><i class="fab fa-github"></i></a>
            <a href="https://discord.com/users/1336353146020298816"><i class="fab fa-discord"></i></a>
            <a href="https://dd-1-jr-shield--danieliphone202.replit.app/"><i class="fas fa-shield-alt"></i></a>
        </div>

        <div class="identity-wrapper">
            <div class="terminal-box">
                <div style="color: var(--neon-blue); margin-bottom: 15px;">> CORE_IDENTITY</div>
                <div class="bio-line"><span class="bio-key">> NAME:</span> Daniel</div>
                <div class="bio-line"><span class="bio-key">> ORIGIN:</span> Iraq 🇮🇶</div>
                <div class="bio-line"><span class="bio-key">> AGE:</span> 15 Cycles</div>
            </div>
            <div class="terminal-box">
                <div style="color: var(--neon-purple); margin-bottom: 15px;">> TECH_STACK</div>
                <div class="bio-line"><span class="bio-key">> ENGINE:</span> LUA / JS</div>
                <div class="bio-line"><span class="bio-key">> SPECIALTY:</span> Cyber Security</div>
                <div class="bio-line"><span class="bio-key">> STATUS:</span> ACTIVE_DEV</div>
            </div>
        </div>
    </section>

    <script>
        // [1] تحريك الماوس
        const cursor = document.getElementById('custom-cursor');
        const outline = document.getElementById('cursor-outline');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            // جعل الإطار يتأخر قليلاً ليعطي شعوراً بالسلاسة
            setTimeout(() => {
                outline.style.left = e.clientX + 'px';
                outline.style.top = e.clientY + 'px';
            }, 50);
        });

        // [2] التحكم في الماتريكس ووضوحها
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        let isMatrixOn = true;

        function updateOpacity(val) {
            canvas.style.opacity = val;
        }

        function toggleMatrix() {
            isMatrixOn = !isMatrixOn;
            const btn = document.getElementById('matrixBtn');
            if (isMatrixOn) {
                canvas.style.display = "block";
                btn.classList.remove('is-off');
                btn.innerHTML = '<i class="fas fa-code"></i> MATRIX: ON';
            } else {
                canvas.style.display = "none";
                btn.classList.add('is-off');
                btn.innerHTML = '<i class="fas fa-code"></i> MATRIX: OFF';
            }
        }

        // [3] التحكم في اللوجات
        let isLogsOn = true;
        function toggleLogs() {
            isLogsOn = !isLogsOn;
            const btn = document.getElementById('logsBtn');
            const logs = document.getElementById('system-logs');
            if (isLogsOn) {
                logs.style.display = "block";
                btn.classList.remove('is-off');
                btn.innerHTML = '<i class="fas fa-terminal"></i> OS_LOGS: ON';
            } else {
                logs.style.display = "none";
                btn.classList.add('is-off');
                btn.innerHTML = '<i class="fas fa-terminal"></i> OS_LOGS: OFF';
            }
        }

        // [4] كود الماتريكس الأصلي
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "01DANIELJR";
        const fontSize = 16;
        const drops = Array(Math.floor(canvas.width/fontSize)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#bc13fe"; ctx.font = fontSize + "px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(letters[Math.floor(Math.random()*letters.length)], i*fontSize, y*fontSize);
                if (y*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 50);

        // [5] شاشة التحميل
        let prg = 0;
        const loader = setInterval(() => {
            prg += 5;
            document.getElementById('bar').style.width = prg + "%";
            if (prg >= 100) {
                clearInterval(loader);
                document.getElementById('intro-overlay').style.display = "none";
                document.body.style.overflowY = "auto";
            }
        }, 100);
    </script>
</body>
</html>
